name = "scintel-slack-bot"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ---- Vars (non-secret config) ----------------------------------------------
[vars]
EMBEDDING_MODEL = "@cf/google/embeddinggemma-300m"
LLM_MODEL = "@cf/moonshotai/kimi-k2.6"
# Agentic retrieval planner loop for Q&A; set to "false" to force single-shot.
AGENTIC_RETRIEVAL = "true"
# Bot user id is used to strip the leading mention from app_mention text.
SLACK_BOT_USER_ID = ""
# Default repo for create-PR when the issue does not mention owner/repo (optional).
DEFAULT_PR_REPO = "KnightMode/slack-code-intelligence"
# Repo whose .github/workflows/index.yml runs the indexer ("index owner/repo" intent).
INDEX_DISPATCH_REPO = "KnightMode/slack-code-intelligence"

# ---- Secrets (set via: wrangler secret put <NAME>) --------------------------
# SLACK_SIGNING_SECRET - verify Slack request signatures
# SLACK_BOT_TOKEN      - xoxb- token for chat.postMessage (Web API)
# GITHUB_PAT           - fine-grained PAT (Contents + Pull requests Read/Write) for agent actions

# ---- D1 metadata database (shared with the webhook worker) ------------------
[[d1_databases]]
binding = "DB"
database_name = "scintel"
database_id = "27722a79-10d9-4bfc-aa53-1d65a80c8f79"

# ---- Vectorize --------------------------------------------------------------
[[vectorize]]
binding = "VECTORIZE"
index_name = "code-chunks"

# ---- Workers AI -------------------------------------------------------------
[ai]
binding = "AI"

# ---- Queues (long-running work runs here — waitUntil is capped at 30s) ------
[[queues.producers]]
binding = "CREATE_PR_QUEUE"
queue = "scintel-create-pr-jobs"

[[queues.producers]]
binding = "ANSWER_QUEUE"
queue = "scintel-answer-jobs"

[[queues.consumers]]
queue = "scintel-create-pr-jobs"
max_batch_size = 1
max_batch_timeout = 5
max_retries = 2
dead_letter_queue = "scintel-create-pr-jobs-dlq"

[[queues.consumers]]
queue = "scintel-answer-jobs"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 1
dead_letter_queue = "scintel-answer-jobs-dlq"
