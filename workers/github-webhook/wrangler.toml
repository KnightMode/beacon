name = "scintel-github-webhook"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# ---- Vars (non-secret config) ----------------------------------------------
[vars]
# Comma-separated owner/name seed for the allowlist (also stored in D1).
REPO_ALLOWLIST = ""
# Base URL of the deployed indexer HTTP service (Node container).
INDEXER_URL = "https://your-indexer.example.com"
# ---- Pipeline dispatch (optional) -------------------------------------------
# When PIPELINE_DISPATCH_REPO is set (and PIPELINE_DISPATCH_TOKEN secret exists),
# the queue consumer triggers the GitHub Actions index.yml workflow via
# repository_dispatch instead of POSTing to INDEXER_URL. Leave empty to keep the
# existing INDEXER_URL behavior.
PIPELINE_DISPATCH_REPO = "KnightMode/slack-code-intelligence"
PIPELINE_DISPATCH_EVENT = "index-repo"

# ---- Secrets (set via: wrangler secret put <NAME>) --------------------------
# GITHUB_WEBHOOK_SECRET   - verify X-Hub-Signature-256 on incoming webhooks
# ADMIN_TOKEN             - bearer token for POST /admin/index
# INDEXER_SHARED_SECRET   - bearer token the queue consumer sends to the indexer
# PIPELINE_DISPATCH_TOKEN - GitHub token allowed to create repository_dispatch
#                           (set via: wrangler secret put PIPELINE_DISPATCH_TOKEN)

# ---- D1 metadata database ---------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "scintel"
database_id = "27722a79-10d9-4bfc-aa53-1d65a80c8f79"

# ---- Queue (this worker is BOTH producer and consumer) ----------------------
[[queues.producers]]
binding = "INDEX_QUEUE"
queue = "scintel-index-jobs"

[[queues.consumers]]
queue = "scintel-index-jobs"
max_batch_size = 5
# Short batch window: a lone push should dispatch to the pipeline within seconds.
max_batch_timeout = 3
max_retries = 3
dead_letter_queue = "scintel-index-jobs-dlq"

# ---- Vectorize (declared for parity; deletes on incremental reindex) --------
[[vectorize]]
binding = "VECTORIZE"
index_name = "code-chunks"

# ---- Workers AI (declared for parity / future in-worker use) ----------------
[ai]
binding = "AI"
