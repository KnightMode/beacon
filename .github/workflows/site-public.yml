name: Make site public

# Removes the Cloudflare Access applications for the Cloudflare Pages admin
# portal. This leaves the Zero Trust organization and identity provider in
# place so Access can be re-enabled later by running Configure site Access.
# The CLOUDFLARE_API_TOKEN secret needs:
# - Access: Apps and Policies Write
# - Cloudflare Pages: Edit

on:
  workflow_dispatch:
    inputs:
      site_hostname:
        description: 'Hostname with admin Access applications'
        required: true
        default: 'askbeacon.dev'
        type: string
      protected_paths:
        description: 'Comma-separated hostname paths to make public'
        required: true
        default: '/admin*,/api/admin*,/oauth/slack/callback*,/oauth/github/callback*'
        type: string
      pages_project_name:
        description: 'Cloudflare Pages project to remove ADMIN_CF_ACCESS_* vars from'
        required: true
        default: 'beacon'
        type: string
      pages_environment:
        description: 'Pages environment to remove ADMIN_CF_ACCESS_* vars from'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
      app_name:
        description: 'Cloudflare Access app name prefix (matches Configure site Access)'
        required: true
        default: 'Beacon'
        type: string

permissions:
  contents: read

jobs:
  remove-access:
    name: Remove Cloudflare Access
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Remove Access
        run: node scripts/remove-cloudflare-access.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCESS_SITE_HOSTNAME: ${{ inputs.site_hostname }}
          ACCESS_PROTECTED_PATHS: ${{ inputs.protected_paths }}
          ACCESS_PAGES_PROJECT_NAME: ${{ inputs.pages_project_name }}
          ACCESS_PAGES_ENVIRONMENT: ${{ inputs.pages_environment }}
          ACCESS_APP_NAME: ${{ inputs.app_name }}
