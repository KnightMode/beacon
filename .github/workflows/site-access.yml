name: Configure site Access

# Manually configures Cloudflare Access for the Cloudflare Pages admin portal.
# The CLOUDFLARE_API_TOKEN secret needs:
# - Access: Apps and Policies Write
# - Access: Organizations, Identity Providers, and Groups Write
# - D1: Edit
# - Cloudflare Pages: Edit

on:
  workflow_dispatch:
    inputs:
      allowed_emails:
        description: 'Comma-separated email addresses allowed to log in with OTP'
        required: false
        default: 'differentialcircuit@gmail.com'
        type: string
      allowed_domains:
        description: 'Comma-separated email domains allowed to log in with OTP'
        required: false
        type: string
      site_hostname:
        description: 'Hostname to protect with Cloudflare Access'
        required: true
        default: 'beacon-90k.pages.dev'
        type: string
      protected_paths:
        description: 'Comma-separated hostname paths to protect'
        required: true
        default: '/admin*,/api/admin*,/oauth/slack/callback*,/oauth/github/callback*'
        type: string
      pages_project_name:
        description: 'Cloudflare Pages project that receives ADMIN_CF_ACCESS_* vars'
        required: true
        default: 'beacon'
        type: string
      pages_environment:
        description: 'Pages environment to update with ADMIN_CF_ACCESS_* vars'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - preview
      d1_binding:
        description: 'Cloudflare Pages D1 binding name for the admin portal'
        required: true
        default: 'DB'
        type: string
      d1_database_name:
        description: 'Cloudflare D1 database name for the admin portal'
        required: true
        default: 'scintel'
        type: string
      d1_database_id:
        description: 'Cloudflare D1 database id for the admin portal'
        required: false
        default: '27722a79-10d9-4bfc-aa53-1d65a80c8f79'
        type: string
      slack_client_id:
        description: 'Slack OAuth client id for the admin portal'
        required: false
        type: string
      github_app_slug:
        description: 'GitHub App slug used by Connect GitHub'
        required: false
        default: 'scintel-indexer'
        type: string
      pipeline_dispatch_repo:
        description: 'Repo that receives repository_dispatch indexing events'
        required: false
        default: 'KnightMode/beacon'
        type: string
      pipeline_dispatch_event:
        description: 'repository_dispatch event type for indexing'
        required: false
        default: 'index-repo'
        type: string
      github_app_id:
        description: 'GitHub App id for installation repo listing'
        required: false
        type: string
      app_name:
        description: 'Cloudflare Access application name'
        required: true
        default: 'Beacon admin portal'
        type: string
      auth_domain:
        description: 'Zero Trust team domain for Access login'
        required: true
        default: 'beacon-90k.cloudflareaccess.com'
        type: string
      session_duration:
        description: 'Cloudflare Access session duration'
        required: true
        default: '24h'
        type: string

permissions:
  contents: read

jobs:
  configure:
    name: Configure Cloudflare Access
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply D1 admin schema
        run: |
          set -euo pipefail
          npx wrangler d1 execute "${PAGES_D1_DATABASE_NAME}" --remote --file=packages/shared/migrations/0004_tenants.sql
          npx wrangler d1 execute "${PAGES_D1_DATABASE_NAME}" --remote --file=packages/shared/migrations/0005_tenant_ci_triage_runs.sql
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PAGES_D1_DATABASE_NAME: ${{ inputs.d1_database_name }}
      - name: Configure Access
        run: node scripts/configure-cloudflare-access.mjs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCESS_ALLOWED_EMAILS: ${{ inputs.allowed_emails }}
          ACCESS_ALLOWED_DOMAINS: ${{ inputs.allowed_domains }}
          ACCESS_SITE_HOSTNAME: ${{ inputs.site_hostname }}
          ACCESS_PROTECTED_PATHS: ${{ inputs.protected_paths }}
          ACCESS_PAGES_PROJECT_NAME: ${{ inputs.pages_project_name }}
          ACCESS_PAGES_ENVIRONMENT: ${{ inputs.pages_environment }}
          ACCESS_APP_NAME: ${{ inputs.app_name }}
          ACCESS_AUTH_DOMAIN: ${{ inputs.auth_domain }}
          ACCESS_SESSION_DURATION: ${{ inputs.session_duration }}
          PAGES_D1_BINDING: ${{ inputs.d1_binding }}
          PAGES_D1_DATABASE_NAME: ${{ inputs.d1_database_name }}
          PAGES_D1_DATABASE_ID: ${{ inputs.d1_database_id || vars.CLOUDFLARE_D1_DATABASE_ID }}
          PAGES_SLACK_CLIENT_ID: ${{ inputs.slack_client_id || vars.SLACK_CLIENT_ID }}
          PAGES_GITHUB_APP_SLUG: ${{ inputs.github_app_slug || vars.GITHUB_APP_SLUG }}
          PAGES_GITHUB_APP_ID: ${{ inputs.github_app_id || vars.GITHUB_APP_ID }}
          PAGES_PIPELINE_DISPATCH_REPO: ${{ inputs.pipeline_dispatch_repo || vars.PIPELINE_DISPATCH_REPO }}
          PAGES_PIPELINE_DISPATCH_EVENT: ${{ inputs.pipeline_dispatch_event || vars.PIPELINE_DISPATCH_EVENT }}
          PAGES_ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          PAGES_SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          PAGES_SLACK_TOKEN_ENCRYPTION_SECRET: ${{ secrets.SLACK_TOKEN_ENCRYPTION_SECRET }}
          PAGES_GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          PAGES_PIPELINE_DISPATCH_TOKEN: ${{ secrets.PIPELINE_DISPATCH_TOKEN }}
      - name: Deploy Pages with Access vars
        run: npx wrangler pages deploy site --project-name="${ACCESS_PAGES_PROJECT_NAME}" --branch=main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCESS_PAGES_PROJECT_NAME: ${{ inputs.pages_project_name }}
