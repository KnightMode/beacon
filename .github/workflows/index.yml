name: Index Repository

# Indexer CLI runner. Tenant/customer repo jobs arrive through
# repository_dispatch with tenantId + installationId; the CLI then mints a
# GitHub App installation token. GITHUB_PAT is kept only for manual/internal
# non-tenant runs.

on:
  repository_dispatch:
    types: [index-repo]
  workflow_dispatch:
    inputs:
      repo:
        description: 'owner/repo'
        required: true
      job_type:
        description: 'FULL_INDEX or INCREMENTAL_INDEX'
        required: false
        default: 'FULL_INDEX'
      files:
        description: 'space-separated changed files (incremental)'
        required: false
        default: ''
      removed_files:
        description: 'space-separated removed files (incremental)'
        required: false
        default: ''
      force:
        description: 'true = full re-chunk/re-embed, no shortcuts'
        required: false
        default: 'false'
      commit_sha:
        description: 'optional commit sha'
        required: false
        default: ''
      tenant_id:
        description: 'optional tenant id for vector metadata'
        required: false
        default: ''
      installation_id:
        description: 'optional GitHub App installation id for App auth'
        required: false
        default: ''

# Serialize indexings of the same repo so two runs never overlap.
concurrency:
  group: index-${{ github.event.client_payload.repo || github.event.inputs.repo }}
  cancel-in-progress: false

jobs:
  index:
    name: Index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --workspace=@scintel/indexer --include-workspace-root
      - name: Run indexer
        working-directory: services/indexer
        # Untrusted payload fields are passed as env (never interpolated into the
        # shell) to avoid Actions script injection. The runner validates them.
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_REPO: ${{ github.event.client_payload.repo }}
          PAYLOAD_JOBTYPE: ${{ github.event.client_payload.jobType }}
          PAYLOAD_SHA: ${{ github.event.client_payload.commitSha }}
          PAYLOAD_TENANT_ID: ${{ github.event.client_payload.tenantId }}
          PAYLOAD_INSTALLATION_ID: ${{ github.event.client_payload.installationId }}
          PAYLOAD_FILES_JSON: ${{ toJSON(github.event.client_payload.changedFiles) }}
          PAYLOAD_REMOVED_JSON: ${{ toJSON(github.event.client_payload.removedFiles) }}
          PAYLOAD_FORCE: ${{ github.event.client_payload.force }}
          INPUT_REPO: ${{ github.event.inputs.repo }}
          INPUT_JOBTYPE: ${{ github.event.inputs.job_type }}
          INPUT_SHA: ${{ github.event.inputs.commit_sha }}
          INPUT_TENANT_ID: ${{ github.event.inputs.tenant_id }}
          INPUT_INSTALLATION_ID: ${{ github.event.inputs.installation_id }}
          INPUT_FILES: ${{ github.event.inputs.files }}
          INPUT_REMOVED: ${{ github.event.inputs.removed_files }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
          # indexer runtime config:
          GITHUB_APP_ID: ${{ vars.BEACON_GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.BEACON_GITHUB_APP_PRIVATE_KEY }}
          GITHUB_PAT: ${{ secrets.INDEXER_GITHUB_PAT }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DATABASE_ID: '27722a79-10d9-4bfc-aa53-1d65a80c8f79'
          CLOUDFLARE_VECTORIZE_INDEX: 'code-chunks'
          # loadConfig requires it but the CLI path does not use it.
          INDEXER_SHARED_SECRET: 'ci-cli-unused'
        run: node scripts/ci-index.mjs
