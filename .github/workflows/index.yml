name: Index Repository

# Indexer CLI runner. Tenant/customer repo jobs arrive through
# repository_dispatch with tenantId + installationId; the CLI then mints a
# GitHub App installation token. GITHUB_PAT is kept only for manual/internal
# non-tenant runs.

on:
  repository_dispatch:
    types: [index-repo]
  workflow_dispatch:
    inputs:
      repo:
        description: 'owner/repo'
        required: true
      job_type:
        description: 'FULL_INDEX or INCREMENTAL_INDEX'
        required: false
        default: 'FULL_INDEX'
      files:
        description: 'space-separated changed files (incremental)'
        required: false
        default: ''
      removed_files:
        description: 'space-separated removed files (incremental)'
        required: false
        default: ''
      force:
        description: 'true = full re-chunk/re-embed, no shortcuts'
        required: false
        default: 'false'
      commit_sha:
        description: 'optional commit sha'
        required: false
        default: ''
      tenant_id:
        description: 'optional tenant id for vector metadata'
        required: false
        default: ''
      installation_id:
        description: 'optional GitHub App installation id for App auth'
        required: false
        default: ''

# Least privilege: the indexer reads the repo tree and writes only to external
# services (D1, Vectorize) via Cloudflare tokens, never back to this repo.
permissions:
  contents: read

# Serialize indexings of the same repo so two runs never overlap.
concurrency:
  group: index-${{ github.event.client_payload.repo || github.event.inputs.repo }}
  cancel-in-progress: false

jobs:
  index:
    name: Index
    runs-on: ubuntu-latest
    env:
      CODE_INTEL_MODE: ${{ vars.BEACON_CODE_INTEL_MODE || 'best_effort' }}
      CODE_INTEL_ENABLED: ${{ !vars.BEACON_CODE_INTEL_MODE || vars.BEACON_CODE_INTEL_MODE == 'best_effort' || vars.BEACON_CODE_INTEL_MODE == 'best-effort' || vars.BEACON_CODE_INTEL_MODE == 'required' || vars.BEACON_CODE_INTEL_MODE == 'true' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v6
        if: ${{ env.CODE_INTEL_ENABLED == 'true' }}
        with:
          go-version: '1.25.9'
      - run: npm ci --workspace=@scintel/indexer --include-workspace-root
      - name: Install Zoekt indexer
        if: ${{ env.CODE_INTEL_ENABLED == 'true' }}
        run: |
          go install github.com/sourcegraph/zoekt/cmd/zoekt-index@v0.0.0-20260605122240-893a523804f1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run indexer
        working-directory: services/indexer
        # Untrusted payload fields are passed as env (never interpolated into the
        # shell) to avoid Actions script injection. The runner validates them.
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_REPO: ${{ github.event.client_payload.repo }}
          PAYLOAD_JOBTYPE: ${{ github.event.client_payload.jobType }}
          PAYLOAD_SHA: ${{ github.event.client_payload.commitSha }}
          PAYLOAD_TENANT_ID: ${{ github.event.client_payload.tenantId }}
          PAYLOAD_INSTALLATION_ID: ${{ github.event.client_payload.installationId }}
          PAYLOAD_FILES_JSON: ${{ toJSON(github.event.client_payload.changedFiles) }}
          PAYLOAD_REMOVED_JSON: ${{ toJSON(github.event.client_payload.removedFiles) }}
          PAYLOAD_FORCE: ${{ github.event.client_payload.force }}
          INPUT_REPO: ${{ github.event.inputs.repo }}
          INPUT_JOBTYPE: ${{ github.event.inputs.job_type }}
          INPUT_SHA: ${{ github.event.inputs.commit_sha }}
          INPUT_TENANT_ID: ${{ github.event.inputs.tenant_id }}
          INPUT_INSTALLATION_ID: ${{ github.event.inputs.installation_id }}
          INPUT_FILES: ${{ github.event.inputs.files }}
          INPUT_REMOVED: ${{ github.event.inputs.removed_files }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
          INDEX_RESULT_JSON: ${{ runner.temp }}/beacon-index-result.json
          # indexer runtime config:
          GITHUB_APP_ID: ${{ vars.BEACON_GITHUB_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.BEACON_GITHUB_APP_PRIVATE_KEY }}
          GITHUB_PAT: ${{ secrets.INDEXER_GITHUB_PAT }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_VECTORIZE_INDEX: 'code-chunks'
          # Optional production code-intel foundation. Heavy generation still
          # runs in GitHub Actions; live Zoekt queries are served separately.
          CODE_INTEL_MODE: ${{ env.CODE_INTEL_MODE }}
          CODE_INTEL_ARTIFACT_BASE_URI: ${{ vars.BEACON_CODE_INTEL_ARTIFACT_BASE_URI || format('r2://{0}/{1}', vars.BEACON_CODE_INTEL_BUCKET || 'beacon-code-intel', vars.BEACON_ZOEKT_R2_PREFIX || 'zoekt') }}
          ZOEKT_INDEX_BIN: 'zoekt-index'
          ZOEKT_INDEX_DIR: ${{ runner.temp }}/beacon-zoekt-index
          SCIP_COMMANDS_JSON: ${{ vars.BEACON_SCIP_COMMANDS_JSON }}
          SCIP_FACTS_PATH: ${{ vars.BEACON_SCIP_FACTS_PATH }}
          # loadConfig requires it but the CLI path does not use it.
          INDEXER_SHARED_SECRET: 'ci-cli-unused'
        run: node scripts/ci-index.mjs
      - name: Provision code-intel R2 bucket
        if: ${{ env.CODE_INTEL_ENABLED == 'true' }}
        run: node scripts/provision-code-intel.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BEACON_CODE_INTEL_BUCKET: ${{ vars.BEACON_CODE_INTEL_BUCKET || 'beacon-code-intel' }}
          BEACON_ZOEKT_R2_PREFIX: ${{ vars.BEACON_ZOEKT_R2_PREFIX || 'zoekt' }}
      - name: Sync Zoekt indexes to R2
        if: ${{ env.CODE_INTEL_ENABLED == 'true' }}
        run: node scripts/sync-zoekt-index-to-r2.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BEACON_CODE_INTEL_BUCKET: ${{ vars.BEACON_CODE_INTEL_BUCKET || 'beacon-code-intel' }}
          BEACON_ZOEKT_R2_PREFIX: ${{ vars.BEACON_ZOEKT_R2_PREFIX || 'zoekt' }}
          ZOEKT_INDEX_DIR: ${{ runner.temp }}/beacon-zoekt-index
          INDEX_RESULT_JSON: ${{ runner.temp }}/beacon-index-result.json
