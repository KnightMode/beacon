name: Deploy site

# Auto-deploy the marketing site (site/) to Cloudflare Pages on every push to
# main that touches it. Mirrors deploy.yml's wrangler + secrets convention.
# The CLOUDFLARE_API_TOKEN must include the "Cloudflare Pages: Edit" permission.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'functions/**'
      - 'package.json'
      - 'package-lock.json'
      - 'packages/shared/migrations/0004_tenants.sql'
      - 'packages/shared/migrations/0005_tenant_ci_triage_runs.sql'
      - 'packages/shared/migrations/0006_installation_repo_grants.sql'
      - 'scripts/apply-admin-d1-migrations.mjs'
      - 'scripts/configure-pages-runtime.mjs'
      - '.github/workflows/site.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:functions
      - name: Apply D1 admin schema
        run: node scripts/apply-admin-d1-migrations.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_D1_DATABASE_NAME: ${{ vars.PAGES_D1_DATABASE_NAME || 'scintel' }}
      - name: Sync Pages runtime config
        run: node scripts/configure-pages-runtime.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_PROJECT_NAME: beacon
          PAGES_ENVIRONMENT: production
          PAGES_D1_BINDING: DB
          PAGES_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID || '27722a79-10d9-4bfc-aa53-1d65a80c8f79' }}
          PAGES_SLACK_CLIENT_ID: ${{ vars.SLACK_CLIENT_ID }}
          PAGES_GITHUB_APP_SLUG: ${{ vars.BEACON_GITHUB_APP_SLUG }}
          PAGES_GITHUB_APP_ID: ${{ vars.BEACON_GITHUB_APP_ID }}
          PAGES_INDEXER_URL: ${{ vars.INDEXER_URL }}
          PAGES_ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          PAGES_SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          PAGES_SLACK_TOKEN_ENCRYPTION_SECRET: ${{ secrets.SLACK_TOKEN_ENCRYPTION_SECRET }}
          PAGES_GITHUB_APP_PRIVATE_KEY: ${{ secrets.BEACON_GITHUB_APP_PRIVATE_KEY }}
          PAGES_INDEXER_SHARED_SECRET: ${{ secrets.INDEXER_SHARED_SECRET }}
      - name: Deploy
        run: npx wrangler pages deploy site --project-name=beacon --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Attach custom domain
        run: npm run attach:pages-domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PAGES_CUSTOM_DOMAIN: askbeacon.dev
