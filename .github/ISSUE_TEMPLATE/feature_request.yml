name: Feature request
description: Suggest an idea or improvement for Beacon
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point. "I'm always frustrated when…"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? How might it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Area
      options:
        - retrieval / answer quality
        - Slack experience
        - GitHub / indexing
        - admin portal / onboarding
        - deployment / ops
        - docs
        - other
    validations:
      required: false
